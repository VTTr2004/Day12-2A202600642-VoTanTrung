version: "3.9"

services:
  agent:
    build: .
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Gemini Chatbot
    env_file:
      - .env.local
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
