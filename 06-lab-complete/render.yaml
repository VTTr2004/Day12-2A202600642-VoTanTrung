services:
  - type: web
    name: gemini-streamlit-chatbot
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /_stcore/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-3.1-flash-lite
